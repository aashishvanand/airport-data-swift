name: Release

on:
  push:
    branches: [ "release" ]

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        include:
          - swift-version: '5.9'
            os: macos-13
          - swift-version: '5.10'
            os: macos-14
          - swift-version: '6.0'
            os: macos-15
          - swift-version: '6.1'
            os: macos-15
          - swift-version: '6.2'
            os: macos-15

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Swift ${{ matrix.swift-version }}
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: ${{ matrix.swift-version }}

    - name: Build
      run: swift build -v

    - name: Run tests
      run: swift test -v

  release:
    needs: test
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from Package.swift
      id: version
      run: |
        # Extract version from the latest commit message, expected format: "Release X.Y.Z"
        VERSION=$(git log -1 --pretty=%s | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "")
        if [ -z "$VERSION" ]; then
          echo "No version found in commit message. Commit message should contain a version like 'Release 1.2.3'"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Detected version: $VERSION"

    - name: Check if tag already exists
      run: |
        if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
          echo "Tag ${{ steps.version.outputs.version }} already exists"
          exit 1
        fi

    - name: Create and push tag
      run: |
        git tag "${{ steps.version.outputs.version }}"
        git push origin "${{ steps.version.outputs.version }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: ${{ steps.version.outputs.version }}
        generate_release_notes: true
