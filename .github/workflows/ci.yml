name: CI

on:
  push:
    branches: [ "main", "release" ]
  pull_request:
    branches: [ "main" ]

permissions: read-all

jobs:
  test:
    strategy:
      matrix:
        include:
          - swift-version: '5.9'
            os: macos-13
          - swift-version: '5.10'
            os: macos-14
          - swift-version: '6.0'
            os: macos-15
          - swift-version: '6.1'
            os: macos-15
          - swift-version: '6.2'
            os: macos-15

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Swift ${{ matrix.swift-version }}
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: ${{ matrix.swift-version }}

    - name: Build
      run: swift build -v

    - name: Run tests
      run: swift test -v
